<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <!--
    OG 이미지(1200×630) 생성용 소스. 배포되지 않는 파일이다.
    재생성: 이 파일을 브라우저에서 열고 1200×630 뷰포트로 스크린샷 →
            docs-site/static/img/og-image.png 로 저장.
    디자인 토큰은 static/slides/index.html 과 동일하게 유지할 것.
  -->
  <link rel="stylesheet" href="../static/vendor/fonts/pretendard.css">
  <style>
    :root {
      --bg-0: #06080F;
      --fg: #FFFFFF;
      --accent: #9B82FF;
      --accent-2: #2BEAD0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      background: var(--bg-0);
      font-family: 'Pretendard', system-ui, sans-serif;
      color: var(--fg);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 84px;
    }
    /* 네뷸라 글로우 */
    body::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(circle at 12% 18%, rgba(124,92,255,0.30), transparent 48%),
        radial-gradient(circle at 88% 82%, rgba(0,224,199,0.22), transparent 48%),
        radial-gradient(circle at 55% 45%, rgba(255,94,126,0.07), transparent 60%);
    }
    /* 모눈 */
    body::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(124,92,255,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,92,255,0.07) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.9), transparent 78%);
      -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.9), transparent 78%);
    }
    .inner { position: relative; z-index: 1; }

    .chip {
      display: inline-block; padding: .5em 1.15em; border-radius: 8px;
      font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700;
      letter-spacing: .06em;
      background: #2A2150; border: 1.5px solid rgba(155,130,255,.85);
      margin-bottom: 34px;
    }
    h1 {
      font-size: 76px; font-weight: 800; line-height: 1.16; letter-spacing: -0.03em;
      text-shadow: 0 2px 0 rgba(0,0,0,.8), 0 4px 12px rgba(0,0,0,.5);
    }
    .grad {
      background: linear-gradient(120deg, #C7B8FF 0%, #7BFFE8 50%, #FFA8BC 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      /* 부모 h1의 text-shadow가 투명 글자 뒤로 비쳐 탁해지므로 제거 */
      text-shadow: none;
      filter: drop-shadow(0 3px 10px rgba(0,0,0,0.55));
    }
    .tagline {
      margin-top: 30px; font-size: 27px; line-height: 1.55; color: #C9D0E0;
      word-break: keep-all; max-width: 900px;
    }
    .footer {
      position: absolute; left: 84px; right: 84px; bottom: 52px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 1;
    }
    .brand { display: flex; align-items: center; gap: 15px; }
    .brand .mark {
      width: 46px; height: 46px; border-radius: 12px;
      background: #0E1220; border: 2px solid transparent;
      background-image: linear-gradient(#0E1220, #0E1220), linear-gradient(135deg, #9B82FF, #2BEAD0);
      background-origin: border-box; background-clip: padding-box, border-box;
      display: flex; align-items: center; justify-content: center;
    }
    .brand .name {
      font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 800;
      letter-spacing: -0.01em;
    }
    .tags { display: flex; gap: 11px; }
    .tag {
      padding: .45em 1em; border-radius: 999px; font-size: 19px; font-weight: 700;
      background: #2A2150; border: 1.5px solid rgba(155,130,255,.7); color: #E1D9FF;
    }
    .tag.green { background: #0D3D38; border-color: rgba(43,234,208,.8); color: #C5FFF5; }
  </style>
</head>
<body>
  <div class="inner">
    <div class="chip">WORKTWIN · 개인 업무 에이전트</div>
    <h1>내 메일함으로 만드는,<br/><span class="grad">나보다 나를 잘 아는</span> 에이전트</h1>
    <p class="tagline">
      수년간 쌓인 메일함을 학습해 나를 대신해 검색하고, 답하고, 역할을 맡습니다.
    </p>
  </div>

  <div class="footer">
    <div class="brand">
      <div class="mark">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <defs>
            <linearGradient id="mg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#9B82FF"/>
              <stop offset="1" stop-color="#2BEAD0"/>
            </linearGradient>
          </defs>
          <rect x="2" y="5" width="20" height="14" rx="2.5" stroke="url(#mg)" stroke-width="2"/>
          <path d="M2.6 6.2 12 13l9.4-6.8" stroke="url(#mg)" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <span class="name">WorkTwin</span>
    </div>
    <div class="tags">
      <span class="tag">RAG 메일 검색</span>
      <span class="tag green">답장 스킬</span>
      <span class="tag">역할 서브에이전트</span>
    </div>
  </div>
</body>
</html>
